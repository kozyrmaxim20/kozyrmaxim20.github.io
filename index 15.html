<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Цыганский Лемон Лист</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #140f1e;
    --card: #1c1530;
    --card-alt: #221a38;
    --lemon: #e4ff5c;
    --lemon-dim: #b9d148;
    --mystic: #a25ce0;
    --ink: #f4f0ea;
    --muted: #a598c4;
    --danger: #e05c7a;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background: radial-gradient(ellipse at 50% -10%, #2a1c46 0%, #140f1e 55%), var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 32px 14px 80px;
  }

  .wrap{ width:100%; max-width: 720px; }

  .card{
    background: var(--card);
    border: 1px solid #362857;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);
    position: relative;
  }

  .header{
    position: relative;
    padding: 44px 32px 34px;
    text-align: center;
    background:
      radial-gradient(circle at 20% 20%, rgba(162,92,224,0.25), transparent 45%),
      radial-gradient(circle at 80% 0%, rgba(228,255,92,0.12), transparent 40%),
      linear-gradient(180deg, #251a3f 0%, #1c1530 100%);
    border-bottom: 1px solid #382a5c;
  }

  .lang-switch{
    position: absolute;
    top: 14px;
    right: 14px;
    display:flex;
    gap: 4px;
    z-index: 2;
  }
  .lang-btn{
    background: rgba(28,21,48,0.6);
    border: 1px solid #382a5c;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 5px 9px;
    border-radius: 7px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .lang-btn.active{
    background: linear-gradient(90deg, rgba(228,255,92,0.16), rgba(162,92,224,0.16));
    border-color: rgba(228,255,92,0.45);
    color: var(--ink);
  }
  .lang-btn:not(.active):hover{ border-color: #45356c; color: var(--ink); }

  .lemon-slice{
    position:absolute;
    width: 64px; height:64px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #eaff8a 0%, var(--lemon) 55%, var(--lemon-dim) 100%);
    box-shadow: 0 0 40px rgba(228,255,92,0.45);
    top: -20px; left: 50%;
    transform: translateX(-50%);
  }
  .lemon-slice::before{
    content:"";
    position:absolute; inset:9px;
    border-radius: 50%;
    background: repeating-conic-gradient(from 0deg, #d7f04a 0deg 15deg, #eaff8a 15deg 30deg);
    opacity: 0.55;
  }

  .eyebrow{
    letter-spacing: 0.35em;
    font-size: 11px;
    color: var(--mystic);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .eyebrow::before, .eyebrow::after{ content:"✦"; color: var(--lemon); margin: 0 10px; }

  .title{
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 6vw, 46px);
    text-transform: uppercase;
    line-height: 1.02;
    text-shadow: 0 0 30px rgba(228,255,92,0.25);
  }
  .title .accent{ color: var(--lemon); }

  .subtitle{
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .tabs{
    display:flex;
    gap: 8px;
    padding: 20px 20px 0;
  }
  .tab-btn{
    flex: 1;
    padding: 10px 6px;
    background: transparent;
    border: 1px solid #33254f;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 10px;
    transition: all .15s ease;
  }
  .tab-btn.active{
    background: linear-gradient(90deg, rgba(228,255,92,0.12), rgba(162,92,224,0.12));
    border-color: rgba(228,255,92,0.4);
    color: var(--ink);
  }
  .tab-btn:not(.active):hover{ border-color: #45356c; color: var(--ink); }

  .list{
    padding: 18px 20px 10px;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .row{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 12px;
    border-radius: 16px;
    background: var(--card-alt);
    border: 1px solid #33254f;
    position: relative;
    transition: background .18s ease, border-color .18s ease, box-shadow .18s ease;
    cursor: pointer;
  }
  .row:hover{
    background: linear-gradient(90deg, rgba(228,255,92,0.09), rgba(162,92,224,0.09));
    border-color: rgba(228,255,92,0.35);
    box-shadow: 0 0 22px -6px rgba(228,255,92,0.25);
  }
  .row.no-click{ cursor: default; }
  .row.no-click:hover{
    background: var(--card-alt);
    border-color: #33254f;
    box-shadow: none;
  }

  .thumb{
    width: 130px;
    height: 73px;
    border-radius: 10px;
    overflow: hidden;
    background: linear-gradient(135deg, #2c2148, #1c1530);
    border: 1px solid #382a5c;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .thumb img{ width:100%; height:100%; object-fit: cover; display:block; }
  .thumb .thumb-fallback{ font-size: 22px; color: #4a3c70; }

  .row-body{
    flex: 1;
    min-width: 0;
    display:flex;
    flex-direction:column;
    gap: 5px;
    justify-content:center;
  }

  .title-line{
    display:flex;
    align-items:baseline;
    gap: 7px;
    min-width:0;
  }
  .rank-badge{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 15px;
    color: var(--mystic);
    flex-shrink:0;
  }
  .row.rank-1 .rank-badge{ color: var(--lemon); }
  .row.rank-2 .rank-badge{ color: #d5d5e0; }
  .row.rank-3 .rank-badge{ color: #c98a4b; }

  .level-name{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size: 18px;
    color: var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width: 0;
  }

  .verifier{ font-size: 11.5px; color: var(--muted); }
  .verifier b{ color: var(--mystic); font-weight:500; }
  .verifier .fv{ color: var(--lemon-dim); }

  .points{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 15px;
    color: var(--lemon);
    white-space:nowrap;
  }
  .points span{
    font-family:'JetBrains Mono', monospace;
    font-weight:400;
    font-size: 9px;
    color: var(--muted);
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-left: 5px;
  }

  .admin-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 4px;
    flex-shrink: 0;
  }

  .move-col{
    display:flex;
    flex-direction:column;
    gap: 1px;
    align-items:center;
  }
  .move-col button{
    background: transparent;
    border: none;
    color: #59496f;
    font-size: 9px;
    line-height: 1;
    padding: 4px 3px;
    cursor: pointer;
    border-radius: 4px;
  }
  .move-col button:hover:not(:disabled){ color: var(--lemon); background: rgba(228,255,92,0.12); }
  .move-col button:disabled{ opacity: 0.2; cursor: default; }

  .row-actions{
    display:flex;
    flex-direction:column;
    gap: 2px;
    align-items:center;
  }
  .del, .edit{
    background: transparent;
    border: none;
    color: #6a5a94;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 6px;
    opacity: 1;
    transition: color .15s ease, background .15s ease;
    border-radius: 6px;
  }
  .del:hover, .del:active{ color: var(--danger); background: rgba(224,92,122,0.12); }
  .edit:hover, .edit:active{ color: var(--lemon); background: rgba(228,255,92,0.12); }

  /* add button + form */
  .add-zone{ padding: 16px 20px 26px; }

  .add-btn{
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px dashed #45356c;
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s ease;
  }
  .add-btn:hover{ border-color: var(--lemon); color: var(--lemon); }

  .add-form{
    display:none;
    flex-direction: column;
    gap: 10px;
    padding: 16px;
    border-radius: 12px;
    background: var(--card-alt);
    border: 1px solid #33254f;
  }
  .add-form.open{ display:flex; }

  .add-form label{
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #7a6ba0;
    margin-bottom: 4px;
    display:block;
  }
  .add-form input[type=text], .add-form input[type=number], .add-form input[type=date], .add-form textarea{
    width: 100%;
    background: #16101f;
    border: 1px solid #362857;
    border-radius: 8px;
    padding: 10px 11px;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
  }
  .add-form textarea{ resize: vertical; min-height: 62px; line-height: 1.5; }
  .add-form input:focus, .add-form textarea:focus{ outline:none; border-color: var(--lemon); }

  .add-form .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .add-form .actions{ display:flex; gap: 10px; margin-top: 4px; }
  .add-form button{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 10px 16px;
    border: 1px solid #3a2c5c;
    background: #241a3c;
    color: var(--ink);
    cursor: pointer;
  }
  .add-form button.primary{
    background: var(--lemon);
    color: #1c1530;
    border-color: var(--lemon);
    font-weight: 700;
    flex: 1;
  }
  .add-form button.ghost{ background: transparent; }

  .status{
    text-align:center;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #5c4d80;
    padding-bottom: 6px;
    text-transform: uppercase;
  }

  .config-warning{
    margin: 0 20px 14px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(224,92,122,0.12);
    border: 1px solid rgba(224,92,122,0.4);
    color: var(--danger);
    font-size: 10.5px;
    line-height: 1.5;
    display:none;
  }
  .config-warning.show{ display:block; }

  .footer{
    padding: 12px 32px 26px;
    text-align:center;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #5c4d80;
    border-top: 1px solid #2c2148;
    text-transform:uppercase;
  }

  .admin-bar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    padding: 0 20px 10px;
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .admin-bar b{ color: var(--lemon); }
  .admin-bar button{
    background: transparent;
    border: 1px solid #362857;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 7px;
    cursor: pointer;
  }
  .admin-bar button:hover{ border-color: var(--danger); color: var(--danger); }

  /* auth modal */
  .modal-overlay{
    display:none;
    position: fixed;
    inset: 0;
    background: rgba(10, 7, 18, 0.72);
    backdrop-filter: blur(3px);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    width: 100%;
    max-width: 340px;
    background: var(--card);
    border: 1px solid #382a5c;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8);
  }
  .modal-title{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 16px;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .modal-sub{
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height:1.5;
  }
  .modal-box label{
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #7a6ba0;
    margin-bottom: 4px;
    display:block;
  }
  .modal-box input{
    width: 100%;
    background: #16101f;
    border: 1px solid #362857;
    border-radius: 8px;
    padding: 10px 11px;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .modal-box input:focus{ outline:none; border-color: var(--lemon); }
  .modal-error{
    font-size: 10.5px;
    color: var(--danger);
    min-height: 14px;
    margin: -4px 0 10px;
  }
  .modal-actions{ display:flex; gap: 8px; }
  .modal-actions button{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid #3a2c5c;
    background: #241a3c;
    color: var(--ink);
    cursor: pointer;
    flex: 1;
  }
  .modal-actions button.primary{
    background: var(--lemon);
    color: #1c1530;
    border-color: var(--lemon);
    font-weight: 700;
  }
  .modal-view-btn{
    width:100%;
    margin-top: 8px;
    background: transparent;
    border: 1px dashed #45356c;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 9px;
    border-radius: 8px;
    cursor: pointer;
  }
  .modal-view-btn:hover{ border-color: var(--lemon); color: var(--lemon); }

  /* level detail modal */
  .detail-box{
    width: 100%;
    max-width: 460px;
    max-height: 88vh;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid #382a5c;
    border-radius: 18px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8);
  }
  .detail-close{
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(20,15,30,0.6);
    border: 1px solid #382a5c;
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height:1;
    z-index: 3;
  }
  .detail-close:hover{ color: var(--lemon); border-color: var(--lemon); }
  .detail-head{
    position: relative;
    padding: 30px 26px 22px;
    text-align:center;
    background:
      radial-gradient(circle at 20% 10%, rgba(162,92,224,0.28), transparent 45%),
      radial-gradient(circle at 80% 0%, rgba(228,255,92,0.14), transparent 40%),
      linear-gradient(180deg, #251a3f 0%, #1c1530 100%);
    border-bottom: 1px solid #382a5c;
  }
  .detail-rank{
    display:inline-block;
    background: rgba(162,92,224,0.18);
    border: 1px solid rgba(162,92,224,0.5);
    color: var(--mystic);
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .detail-title{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 26px;
    text-transform: uppercase;
    color: var(--ink);
  }
  .detail-creator{
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .detail-creator b{ color: var(--ink); font-weight:600; }
  .detail-verified{
    display:inline-flex;
    align-items:center;
    gap: 6px;
    margin-top: 14px;
    padding: 7px 16px;
    border-radius: 30px;
    background: rgba(94, 210, 130, 0.12);
    border: 1px solid rgba(94, 210, 130, 0.4);
    color: #6fd98f;
    font-size: 11.5px;
    font-weight: 600;
  }
  .detail-verified b{ color:#8fe6a8; }
  .detail-desc{
    margin: 18px 4px 0;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
  }
  .detail-media{
    margin: 18px 24px 0;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #382a5c;
    background: #0f0a18;
    position: relative;
  }
  .detail-media img{ width:100%; display:block; aspect-ratio: 16/9; object-fit: cover; }
  .detail-media .play-badge{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .detail-media .play-badge span{
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(224,32,32,0.92);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .detail-media-link{ text-decoration:none; display:block; }
  .detail-media .yt-caption{
    position:absolute;
    left:0; right:0; bottom:0;
    padding: 8px 12px;
    background: linear-gradient(0deg, rgba(0,0,0,0.75), transparent);
    color: #fff;
    font-size: 11.5px;
    font-weight: 600;
    display:flex;
    align-items:center;
    gap: 6px;
  }
  .detail-stats{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 20px 24px 6px;
  }
  .detail-stats .stat-box{
    background: var(--card-alt);
    border: 1px solid #33254f;
    border-radius: 12px;
    padding: 12px 10px;
    text-align:center;
  }
  .detail-stats .stat-box .stat-label{
    font-size: 9px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color: #7a6ba0;
    margin-bottom: 4px;
  }
  .detail-stats .stat-box .stat-value{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 16px;
    color: var(--ink);
    word-break: break-word;
  }
  .detail-stats .stat-box.wide{ grid-column: 1 / -1; }
  .detail-stats .stat-box.accent .stat-value{ color: var(--lemon); }
  .detail-admin-actions{
    display:flex;
    gap: 10px;
    padding: 4px 24px 22px;
  }
  .detail-admin-actions button{
    flex:1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid #3a2c5c;
    background: #241a3c;
    color: var(--ink);
    cursor: pointer;
  }
  .detail-admin-actions button.edit-detail-btn:hover{ border-color: var(--lemon); color: var(--lemon); }
  .detail-admin-actions button.del-detail-btn:hover{ border-color: var(--danger); color: var(--danger); }

  /* position history / records subsections */
  .detail-subsection{
    margin: 6px 24px 0;
    border-radius: 14px;
    background: var(--card-alt);
    border: 1px solid #33254f;
    overflow: hidden;
  }
  .detail-subsection:last-of-type{ margin-bottom: 20px; }
  .subsection-header{
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }
  .subsection-header .sh-icon{ font-size: 15px; color: var(--mystic); flex-shrink:0; }
  .subsection-header .sh-title{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size: 14.5px;
    color: var(--ink);
    flex: 1;
  }
  .subsection-header .sh-chevron{
    color: var(--muted);
    font-size: 11px;
    transition: transform .18s ease;
  }
  .detail-subsection.collapsed .sh-chevron{ transform: rotate(180deg); }
  .subsection-body{
    padding: 0 16px 16px;
  }
  .detail-subsection.collapsed .subsection-body{ display:none; }

  .subsection-list{
    max-height: 340px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .subsection-list::-webkit-scrollbar{ width: 5px; }
  .subsection-list::-webkit-scrollbar-thumb{ background: #382a5c; border-radius: 10px; }
  .subsection-list::-webkit-scrollbar-track{ background: transparent; }

  .entry-card{
    background: #1c1530;
    border: 1px solid #33254f;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .entry-card:last-child{ margin-bottom: 0; }
  .entry-top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
  }
  .entry-left{

function uid(){ return Math.random().toString(36).slice(2, 9); }
function withIds(arr){ return arr.map(l => ({ id: l.id || uid(), ...l })); }
function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

async function loadLevels(){
  if(!isConfigured()){
    document.getElementById('configWarning').classList.add('show');
    state.levels = withIds(DEFAULT_LEVELS);
    state.futureLevels = [];
    state.players = [];
    setStatus(I18N[currentLang].statusDefaultNoConfig);
    return;
  }
  try{
    const res = await fetch(`${JSONBIN_BASE}/${JSONBIN_BIN_ID}/latest`, {
      method: 'GET',
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    if(!res.ok){
      const errBody = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status} — ${errBody}`);
    }
    const data = await res.json();
    const record = data && data.record;
    state.levels = (record && Array.isArray(record.levels) && record.levels.length)
      ? withIds(record.levels) : withIds(DEFAULT_LEVELS);
    state.futureLevels = (record && Array.isArray(record.futureLevels)) ? withIds(record.futureLevels) : [];
    state.players = (record && Array.isArray(record.players)) ? withIds(record.players) : [];
    setStatus(I18N[currentLang].statusLoaded);
  }catch(e){
    console.warn('JSONBin load failed, falling back to defaults:', e);
    state.levels = withIds(DEFAULT_LEVELS);
    state.futureLevels = [];
    state.players = [];
    setStatus(I18N[currentLang].statusLoadError + e.message);
  }
}

let saveTimer = null;
let saveAttempt = 0;

function saveLevels(){
  clearTimeout(saveTimer);
  setStatus(I18N[currentLang].statusSaving);
  saveTimer = setTimeout(doSave, 300);
}

async function doSave(){
  if(!isConfigured()){
    document.getElementById('configWarning').classList.add('show');
    setStatus(I18N[currentLang].statusSaveNoConfig);
    return;
  }
  const payload = { levels: state.levels, futureLevels: state.futureLevels, players: state.players };
  try{
    const res = await fetch(`${JSONBIN_BASE}/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_API_KEY
      },
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const errBody = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status} — ${errBody}`);
    }
    saveAttempt = 0;
    setStatus(I18N[currentLang].statusSaved);
  }catch(e){
    console.error('JSONBin save error:', e);
    saveAttempt += 1;
    if(saveAttempt <= 2){
      setStatus(I18N[currentLang].statusRetrying);
      setTimeout(doSave, 600);
    } else {
      saveAttempt = 0;
      setStatus(I18N[currentLang].statusSaveError + e.message);
    }
  }
}

  if(newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  if(cfg.autoRecalc) recalcPoints(arr);

  saveLevels();

// level detail modal
function youtubeId(url){
  if(!url) return '';
  let id = '';
  try{
    const u = new URL(url);
    if(u.hostname.includes('youtu.be')){
      id = u.pathname.slice(1);
    } else if(u.searchParams.get('v')){
      id = u.searchParams.get('v');
    } else if(u.pathname.includes('/embed/')){
      id = u.pathname.split('/embed/')[1];
    } else if(u.pathname.includes('/shorts/')){
      id = u.pathname.split('/shorts/')[1];
    }
  }catch(e){
    const m = String(url).match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{6,})/);
    if(m) id = m[1];
  }
  return (id || '').split(/[?&]/)[0];
}
function youtubeThumb(id){ return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : ''; }
function rowThumbSrc(lvl){
  if(lvl.thumbnail) return lvl.thumbnail;
  const id = youtubeId(lvl.videoUrl);
  return id ? youtubeThumb(id) : '';
}

function statBox(label, value, extraClass){
  if(value === undefined || value === null || String(value).trim() === '') return '';
  return `<div class="stat-box${extraClass ? ' ' + extraClass : ''}">
    <div class="stat-label">${escapeHtml(label)}</div>
    <div class="stat-value">${escapeHtml(value)}</div>
  </div>`;
}

// position history / records helpers
function countryFlag(code){
  if(!code) return '🌐';
  const c = String(code).trim();
  if(/^[A-Za-z]{2}$/.test(c)){
    const base = 0x1F1E6;
    return [...c.toUpperCase()].map(ch => String.fromCodePoint(base + (ch.charCodeAt(0) - 65))).join('');
  }
  return c; // allow raw emoji / custom text
}

function buildHistoryEntries(lvl, idx, t){
  const entries = [];
  if(lvl.addedDate){
    entries.push({
      date: lvl.addedDate,
      position: idx >= 0 ? (idx + 1) : null,
      note: t.addedToList,
      isAdd: true,
    });
  }
  if(lvl.historyExtra){
    String(lvl.historyExtra).split('\n').forEach(line => {
      const parts = line.split('|').map(p => p.trim());
      if(!parts[0]) return;
      entries.push({ date: parts[0], position: parts[1] || null, note: parts[2] || '', isAdd: false });
    });
  }
  entries.sort((a, b) => String(b.date).localeCompare(String(a.date)));
  return entries;
}

function parseRecordEntries(lvl){
  let recs = [];
  if(lvl.records){
    recs = String(lvl.records).split('\n').map(line => {
      const parts = line.split('|').map(p => p.trim());
      return { country: parts[0] || '', player: parts[1] || '', percent: parts[2] || '', videoUrl: parts[3] || '' };
    }).filter(r => r.player);
  }
  if(!recs.length && lvl.verifier){
    recs = [{ country: '', player: lvl.verifier, percent: '100', videoUrl: lvl.videoUrl || '' }];
  }
  return recs;
}

function renderHistorySection(lvl, idx){
  const t = I18N[currentLang];
  const entries = buildHistoryEntries(lvl, idx, t);
  const body = document.getElementById('historySectionBody');
  if(!body) return;
  if(!entries.length){
    body.innerHTML = `<div class="subsection-empty">${escapeHtml(t.historyEmpty)}</div>`;
    return;
  }
  const itemsHtml = entries.map(e => {
    const rankHtml = (e.position !== null && e.position !== '') ? `<div class="entry-rank">#${escapeHtml(e.position)}</div>` : '';
    return `
      <div class="entry-card">
        <div class="entry-top-row">
          <div class="entry-left">
            <div class="entry-icon ${e.isAdd ? 'add' : 'move'}">${e.isAdd ? '+' : '↺'}</div>
            <div class="entry-date">${escapeHtml(e.date)}</div>
          </div>
          ${rankHtml}
        </div>
        ${e.note ? `<div class="entry-note">${escapeHtml(e.note)}</div>` : ''}
      </div>
    `;
  }).join('');
  body.innerHTML = `<div class="subsection-list">${itemsHtml}</div>`;
}

function renderRecordsSection(lvl){
  const t = I18N[currentLang];
  const recs = parseRecordEntries(lvl);
  const body = document.getElementById('recordsSectionBody');
  if(!body) return;
  const total = recs.length;
  const fullCount = recs.filter(r => String(r.percent).trim() === '100').length;
  const summaryText = t.recordsSummary.replace('{count}', String(total)).replace('{full}', String(fullCount));
  if(!recs.length){
    body.innerHTML = `
      <div class="records-summary"><span class="rs-icon">🏆</span><span>${escapeHtml(summaryText)}</span></div>
      <div class="subsection-empty">${escapeHtml(t.recordsEmpty)}</div>
    `;
    return;
  }
  const itemsHtml = recs.map(r => {
    const playHtml = r.videoUrl
      ? `<a class="record-play" href="${escapeHtml(r.videoUrl)}" target="_blank" rel="noopener noreferrer">▶</a>`
      : '';
    return `
      <div class="record-card">
        <div class="record-left">
          <div class="record-flag">${countryFlag(r.country)}</div>
          <div class="record-player">${escapeHtml(r.player)}</div>
        </div>
        <div class="record-right">
          <div class="record-percent">${escapeHtml(r.percent)}%</div>
          ${playHtml}
        </div>
      </div>
    `;
  }).join('');
  body.innerHTML = `
    <div class="records-summary"><span class="rs-icon">🏆</span><span>${escapeHtml(summaryText)}</span></div>
    <div class="subsection-list">${itemsHtml}</div>
  `;
}

  const suggested = cfg.autoRecalc
    ? Math.max(POINTS_BASE - arr.length * POINTS_STEP, 0)
    : (arr.length ? Math.max(arr[arr.length - 1].points - 40, 0) : 1000);
  fName.value = ''; fVerifier.value = ''; fExtra.value = '';
  fPoints.value = suggested;
  detailFields.forEach(f => f.value = '');
  fAddedDate.value = new Date().toISOString().slice(0, 10);
  fName.focus();
});

function openEditForm(lvl){
  const cfg = TAB_CONFIG[currentTab];
  editingId = lvl.id;
  applyTabLabels();
  formTitle.textContent = I18N[currentLang].editingPrefix + lvl.name;
  submitBtn.textContent = I18N[currentLang].saveChanges;
  deleteFromFormBtn.style.display = 'block';
  deleteFromFormBtn.textContent = deleteThisText(cfg);
  fName.value = lvl.name;
  fVerifier.value = lvl.verifier;
  fPoints.value = lvl.points;
  fExtra.value = lvl.extra || '';
  fCreator.value = lvl.creator || '';
  fThumb.value = lvl.thumbnail || '';
  fVideo.value = lvl.videoUrl || '';
  fDesc.value = lvl.description || '';
  fLevelId.value = lvl.levelId || '';
  fPassword.value = lvl.password || '';
  fLength.value = lvl.length || '';
  fObjects.value = lvl.objects || '';
  fVersion.value = lvl.version || '';
  fAddedDate.value = lvl.addedDate || '';
  fHistoryExtra.value = lvl.historyExtra || '';
  fRecords.value = lvl.records || '';
  addForm.classList.add('open');
  openFormBtn.style.display = 'none';
  addForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
  fName.focus();
}

document.getElementById('cancelBtn').addEventListener('click', closeForm);

function closeForm(){
  addForm.classList.remove('open');
  openFormBtn.style.display = 'block';
  editingId = null;
  fName.value = ''; fVerifier.value = ''; fPoints.value = ''; fExtra.value = '';
  detailFields.forEach(f => f.value = '');
}

submitBtn.addEventListener('click', () => {
  const cfg = TAB_CONFIG[currentTab];
  if(!fName.value.trim()){
    fName.focus();
    return;
  }
  const arr = getArr();
  const detailValues = {
    creator: fCreator.value.trim(),
    thumbnail: fThumb.value.trim(),
    videoUrl: fVideo.value.trim(),
    description: fDesc.value.trim(),
    levelId: fLevelId.value.trim(),
    password: fPassword.value.trim(),
    length: fLength.value.trim(),
    objects: fObjects.value.trim(),
    version: fVersion.value.trim(),
    addedDate: fAddedDate.value.trim(),
    historyExtra: fHistoryExtra.value.trim(),
    records: fRecords.value.trim(),
  };
  if(editingId){
    const lvl = arr.find(l => l.id === editingId);
    if(lvl){
      lvl.name = fName.value.trim();
      lvl.verifier = fVerifier.value.trim();
      lvl.extra = fExtra.value.trim();
      lvl.points = Number(fPoints.value) || 0;
      Object.assign(lvl, detailValues);
    }
  } else {
    arr.push({
      id: uid(),
      name: fName.value.trim(),
      verifier: fVerifier.value.trim(),
      extra: fExtra.value.trim(),
      points: Number(fPoints.value) || 0,
      ...detailValues,
    });
  }
  if(cfg.autoRecalc) recalcPoints(arr);
  closeForm();
  render();
  saveLevels();
});

deleteFromFormBtn.addEventListener('click', () => {
  const cfg = TAB_CONFIG[currentTab];
  if(!editingId) return;
  const lvl = getArr().find(l => l.id === editingId);
  if(lvl && !confirm(deleteConfirmText(cfg.deleteWord, lvl.name))) return;
  const newArr = getArr().filter(l => l.id !== editingId);
  if(cfg.autoRecalc) recalcPoints(newArr);
  setArr(newArr);
  closeForm();
  render();
  saveLevels();
});

[fName, fVerifier, fPoints, fExtra, ...detailFields].forEach(input => {
  if(input.tagName === 'TEXTAREA') return; // allow multi-line input (Enter = new line)
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') submitBtn.click();
  });
});

(async function init(){
  let savedLang = 'ru';
  try{ savedLang = localStorage.getItem('gll_lang') || 'ru'; }catch(e){}
  currentLang = (savedLang === 'en') ? 'en' : 'ru';
  document.documentElement.lang = currentLang;
  document.title = I18N[currentLang].docTitle;
  applyStaticTexts();
  setStatus(I18N[currentLang].statusLoading);
  document.getElementById('langRuBtn').classList.toggle('active', currentLang === 'ru');
  document.getElementById('langEnBtn').classList.toggle('active', currentLang === 'en');

  restoreAdminSession();
  await loadLevels();

  const tabMainBtn = document.getElementById('tabMainBtn');
  const tabFutureBtn = document.getElementById('tabFutureBtn');
  const tabPlayersBtn = document.getElementById('tabPlayersBtn');

  function switchTab(tab){
    currentTab = tab;
    tabMainBtn.classList.toggle('active', tab === 'main');
    tabFutureBtn.classList.toggle('active', tab === 'future');
    tabPlayersBtn.classList.toggle('active', tab === 'players');
    applyTabLabels();
    closeForm();
    render();
  }

  tabMainBtn.addEventListener('click', () => switchTab('main'));
  tabFutureBtn.addEventListener('click', () => switchTab('future'));
  tabPlayersBtn.addEventListener('click', () => switchTab('players'));

  document.getElementById('langRuBtn').addEventListener('click', () => setLanguage('ru'));
  document.getElementById('langEnBtn').addEventListener('click', () => setLanguage('en'));

  applyTabLabels();
  render();
})();
</script>
