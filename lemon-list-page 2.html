<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Цыганский Лемон Лист</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #140f1e;
    --card: #1c1530;
    --card-alt: #221a38;
    --lemon: #e4ff5c;
    --lemon-dim: #b9d148;
    --mystic: #a25ce0;
    --ink: #f4f0ea;
    --muted: #a598c4;
    --danger: #e05c7a;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background: radial-gradient(ellipse at 50% -10%, #2a1c46 0%, #140f1e 55%), var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 32px 14px 80px;
  }

  .wrap{ width:100%; max-width: 720px; }

  .card{
    background: var(--card);
    border: 1px solid #362857;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);
    position: relative;
  }

  .header{
    position: relative;
    padding: 44px 32px 34px;
    text-align: center;
    background:
      radial-gradient(circle at 20% 20%, rgba(162,92,224,0.25), transparent 45%),
      radial-gradient(circle at 80% 0%, rgba(228,255,92,0.12), transparent 40%),
      linear-gradient(180deg, #251a3f 0%, #1c1530 100%);
    border-bottom: 1px solid #382a5c;
  }

  .lemon-slice{
    position:absolute;
    width: 64px; height:64px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #eaff8a 0%, var(--lemon) 55%, var(--lemon-dim) 100%);
    box-shadow: 0 0 40px rgba(228,255,92,0.45);
    top: -20px; left: 50%;
    transform: translateX(-50%);
  }
  .lemon-slice::before{
    content:"";
    position:absolute; inset:9px;
    border-radius: 50%;
    background: repeating-conic-gradient(from 0deg, #d7f04a 0deg 15deg, #eaff8a 15deg 30deg);
    opacity: 0.55;
  }

  .eyebrow{
    letter-spacing: 0.35em;
    font-size: 11px;
    color: var(--mystic);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .eyebrow::before, .eyebrow::after{ content:"✦"; color: var(--lemon); margin: 0 10px; }

  .title{
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 6vw, 46px);
    text-transform: uppercase;
    line-height: 1.02;
    text-shadow: 0 0 30px rgba(228,255,92,0.25);
  }
  .title span{ color: var(--lemon); }

  .subtitle{
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .list{
    padding: 28px 20px 10px;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .row{
    display:grid;
    grid-template-columns: 46px 1fr auto;
    align-items:center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--card-alt);
    border: 1px solid #33254f;
    position: relative;
  }
  .row.top{
    background: linear-gradient(90deg, rgba(228,255,92,0.09), rgba(162,92,224,0.09));
    border-color: rgba(228,255,92,0.35);
  }
  .row::before{ content:""; position:absolute; left:0; top:0; bottom:0; width: 3px; }
  .row.rank-1::before{ background: var(--lemon); }
  .row.rank-2::before{ background: #d5d5e0; }
  .row.rank-3::before{ background: #c98a4b; }
  .row:not(.top)::before{ background: #392b5c; }

  .rank{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 20px;
    text-align:center;
    color: var(--muted);
  }
  .row.top .rank{ font-size: 26px; color: var(--ink); }

  .info{ display:flex; flex-direction:column; gap: 3px; min-width:0; }

  .level-name{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size: 17px;
    color: var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .verifier{ font-size: 11px; color: var(--muted); }
  .verifier b{ color: var(--mystic); font-weight:500; }
  .verifier .fv{ color: var(--lemon-dim); }

  .points{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 18px;
    color: var(--lemon);
    text-align:right;
    white-space:nowrap;
  }
  .points span{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-weight:400;
    font-size: 9px;
    color: var(--muted);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }

  .del{
    position:absolute;
    top: 6px; right: 8px;
    background: transparent;
    border: none;
    color: #4a3a70;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 5px;
    opacity: 0;
    transition: opacity .15s ease;
  }
  .row:hover .del{ opacity: 1; }
  .del:hover{ color: var(--danger); }

  /* add button + form */
  .add-zone{ padding: 16px 20px 26px; }

  .add-btn{
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px dashed #45356c;
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s ease;
  }
  .add-btn:hover{ border-color: var(--lemon); color: var(--lemon); }

  .add-form{
    display:none;
    flex-direction: column;
    gap: 10px;
    padding: 16px;
    border-radius: 12px;
    background: var(--card-alt);
    border: 1px solid #33254f;
  }
  .add-form.open{ display:flex; }

  .add-form label{
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #7a6ba0;
    margin-bottom: 4px;
    display:block;
  }
  .add-form input[type=text], .add-form input[type=number]{
    width: 100%;
    background: #16101f;
    border: 1px solid #362857;
    border-radius: 8px;
    padding: 10px 11px;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
  }
  .add-form input:focus{ outline:none; border-color: var(--lemon); }

  .add-form .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .add-form .actions{ display:flex; gap: 10px; margin-top: 4px; }
  .add-form button{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 10px 16px;
    border: 1px solid #3a2c5c;
    background: #241a3c;
    color: var(--ink);
    cursor: pointer;
  }
  .add-form button.primary{
    background: var(--lemon);
    color: #1c1530;
    border-color: var(--lemon);
    font-weight: 700;
    flex: 1;
  }
  .add-form button.ghost{ background: transparent; }

  .status{
    text-align:center;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #5c4d80;
    padding-bottom: 6px;
    text-transform: uppercase;
  }

  .config-warning{
    margin: 0 20px 14px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(224,92,122,0.12);
    border: 1px solid rgba(224,92,122,0.4);
    color: var(--danger);
    font-size: 10.5px;
    line-height: 1.5;
    display:none;
  }
  .config-warning.show{ display:block; }

  .footer{
    padding: 12px 32px 26px;
    text-align:center;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #5c4d80;
    border-top: 1px solid #2c2148;
    text-transform:uppercase;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="header">
      <div class="lemon-slice"></div>
      <div class="eyebrow">GYPSY EDITION</div>
      <div class="title">ЦЫГАНСКИЙ<br><span>ЛЕМОН ЛИСТ</span></div>
      <div class="subtitle" id="subtitle">РЕЙТИНГ УРОВНЕЙ</div>
    </div>

    <div class="config-warning" id="configWarning">
      ⚠ JSONBin не настроен. Открой файл, найди JSONBIN_API_KEY и JSONBIN_BIN_ID в &lt;script&gt; и вставь свои значения с jsonbin.io.
    </div>

    <div class="list" id="list"></div>

    <div class="add-zone">
      <button class="add-btn" id="openFormBtn">+ Добавить уровень</button>

      <div class="add-form" id="addForm">
        <div>
          <label>Название уровня</label>
          <input type="text" id="fName" placeholder="Название" />
        </div>
        <div class="grid2">
          <div>
            <label>Верификатор</label>
            <input type="text" id="fVerifier" placeholder="Ник" />
          </div>
          <div>
            <label>Очки</label>
            <input type="number" id="fPoints" placeholder="1000" />
          </div>
        </div>
        <div>
          <label>Доп. инфо (необязательно)</label>
          <input type="text" id="fExtra" placeholder="First Victor: ..." />
        </div>
        <div class="actions">
          <button class="primary" id="submitBtn">Добавить в список</button>
          <button class="ghost" id="cancelBtn">Отмена</button>
        </div>
      </div>
    </div>

    <div class="status" id="status">Загрузка…</div>
    <div class="footer">Цыганский Лемон Лист · общий список сообщества</div>
  </div>
</div>

<script>
/* =========================================================
   JSONBIN.IO CONFIG — ЗАПОЛНИ ЭТИ ДВЕ СТРОКИ
   1. Зарегистрируйся на https://jsonbin.io (бесплатно)
   2. В личном кабинете открой "API Keys" и скопируй свой
      X-Master-Key -> вставь в JSONBIN_API_KEY
   3. Создай новый Bin с содержимым {"levels": []} и скопируй
      его Bin ID (виден в URL / в списке бинов) -> JSONBIN_BIN_ID
   ========================================================= */
const JSONBIN_API_KEY = 'ВСТАВЬ_СВОЙ_X_MASTER_KEY';
const JSONBIN_BIN_ID  = 'ВСТАВЬ_СВОЙ_BIN_ID';

const JSONBIN_BASE = 'https://api.jsonbin.io/v3/b';
const isConfigured = () =>
  JSONBIN_API_KEY && JSONBIN_API_KEY.indexOf('ВСТАВЬ_') === -1 &&
  JSONBIN_BIN_ID && JSONBIN_BIN_ID.indexOf('ВСТАВЬ_') === -1;

const DEFAULT_LEVELS = [
  { name: 'Penumbra', verifier: 'muwa1t', extra: '', points: 1000 },
  { name: 'Thanatophobia', verifier: 'BaGGet', extra: '', points: 960 },
  { name: 'Lin Anya', verifier: 'muwa1t', extra: '', points: 920 },
  { name: 'Leyak', verifier: 'BaGGet', extra: '', points: 880 },
  { name: 'Crash game', verifier: 'muwa1t', extra: '', points: 840 },
  { name: 'Pulsar', verifier: 'BaGGet', extra: '', points: 800 },
  { name: 'Nilscapes', verifier: 'muwa1t', extra: 'First Victor: BaGGet', points: 760 },
  { name: 'Shitty Congregation', verifier: 'dimonchik', extra: '', points: 720 },
  { name: 'Supersonic', verifier: 'BaGGet', extra: '', points: 680 },
  { name: 'Poltergeist', verifier: 'BaGGet', extra: '', points: 640 },
  { name: 'Crazy II', verifier: 'muwa1t', extra: 'First Victor: BaGGet', points: 600 },
];

let levels = [];

function uid(){ return Math.random().toString(36).slice(2, 9); }
function withIds(arr){ return arr.map(l => ({ id: l.id || uid(), ...l })); }
function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

async function loadLevels(){
  if(!isConfigured()){
    document.getElementById('configWarning').classList.add('show');
    levels = withIds(DEFAULT_LEVELS);
    setStatus('Исходный список (JSONBin не настроен)');
    return;
  }
  try{
    const res = await fetch(`${JSONBIN_BASE}/${JSONBIN_BIN_ID}/latest`, {
      method: 'GET',
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const record = data && data.record;
    if(record && Array.isArray(record.levels) && record.levels.length){
      levels = withIds(record.levels);
      setStatus('Загружено из JSONBin');
      return;
    }
    // bin exists but is empty — seed it with defaults
    levels = withIds(DEFAULT_LEVELS);
    setStatus('Исходный список');
  }catch(e){
    console.warn('JSONBin load failed, falling back to defaults:', e);
    levels = withIds(DEFAULT_LEVELS);
    setStatus('Не удалось загрузить JSONBin — исходный список');
  }
}

let saveTimer = null;
let saveAttempt = 0;

function saveLevels(){
  clearTimeout(saveTimer);
  setStatus('Сохранение…');
  saveTimer = setTimeout(doSave, 300);
}

async function doSave(){
  if(!isConfigured()){
    document.getElementById('configWarning').classList.add('show');
    setStatus('JSONBin не настроен (не сохранено)');
    return;
  }
  const payload = { levels };
  try{
    const res = await fetch(`${JSONBIN_BASE}/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_API_KEY
      },
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    saveAttempt = 0;
    setStatus('Сохранено · видно всем');
  }catch(e){
    console.error('JSONBin save error:', e);
    saveAttempt += 1;
    if(saveAttempt <= 2){
      setStatus('Повторная попытка сохранения…');
      setTimeout(doSave, 600);
    } else {
      saveAttempt = 0;
      setStatus('Не удалось сохранить — попробуйте ещё раз');
    }
  }
}

function setStatus(text){
  document.getElementById('status').textContent = text;
}

function medalFor(i){
  if(i === 0) return '🥇';
  if(i === 1) return '🥈';
  if(i === 2) return '🥉';
  return String(i + 1);
}
function rankClass(i){
  if(i === 0) return 'rank-1';
  if(i === 1) return 'rank-2';
  if(i === 2) return 'rank-3';
  return '';
}

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('subtitle').textContent = `РЕЙТИНГ УРОВНЕЙ · TOP ${levels.length}`;

  levels.forEach((lvl, i) => {
    const row = document.createElement('div');
    row.className = `row ${i < 3 ? 'top ' : ''}${rankClass(i)}`.trim();

    const verifierLine = lvl.extra
      ? `Верификатор: <b>${escapeHtml(lvl.verifier)}</b> · <span class="fv">${escapeHtml(lvl.extra)}</span>`
      : `Верификатор: <b>${escapeHtml(lvl.verifier)}</b>`;

    row.innerHTML = `
      <button class="del" title="Удалить уровень" data-id="${lvl.id}">✕</button>
      <div class="rank">${medalFor(i)}</div>
      <div class="info">
        <div class="level-name">${escapeHtml(lvl.name)}</div>
        <div class="verifier">${verifierLine}</div>
      </div>
      <div class="points">${lvl.points}<span>points</span></div>
    `;

    row.querySelector('.del').addEventListener('click', () => {
      levels = levels.filter(l => l.id !== lvl.id);
      render();
      saveLevels();
    });

    list.appendChild(row);
  });
}

// add form
const openFormBtn = document.getElementById('openFormBtn');
const addForm = document.getElementById('addForm');
const fName = document.getElementById('fName');
const fVerifier = document.getElementById('fVerifier');
const fPoints = document.getElementById('fPoints');
const fExtra = document.getElementById('fExtra');

openFormBtn.addEventListener('click', () => {
  addForm.classList.add('open');
  openFormBtn.style.display = 'none';
  const suggested = levels.length ? Math.max(levels[levels.length - 1].points - 40, 0) : 1000;
  fPoints.value = suggested;
  fName.focus();
});

document.getElementById('cancelBtn').addEventListener('click', closeForm);

function closeForm(){
  addForm.classList.remove('open');
  openFormBtn.style.display = 'block';
  fName.value = ''; fVerifier.value = ''; fPoints.value = ''; fExtra.value = '';
}

document.getElementById('submitBtn').addEventListener('click', () => {
  if(!fName.value.trim()){
    fName.focus();
    return;
  }
  levels.push({
    id: uid(),
    name: fName.value.trim(),
    verifier: fVerifier.value.trim(),
    extra: fExtra.value.trim(),
    points: Number(fPoints.value) || 0,
  });
  closeForm();
  render();
  saveLevels();
});

[fName, fVerifier, fPoints, fExtra].forEach(input => {
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('submitBtn').click();
  });
});

(async function init(){
  await loadLevels();
  render();
})();
</script>

</body>
</html>
